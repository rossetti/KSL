# Root build properties for the KSL multi-project build.
#
# IMPORTANT: Gradle reads `org.gradle.jvmargs` ONLY from the root project
# directory and ~/.gradle — NOT from subproject gradle.properties files. Without
# this file a fresh checkout (e.g. a CI runner) gets Gradle's ~512 MB default
# heap, which runs out of memory while compiling KSLCore. (Local builds happen to
# work because they pick up heap from ~/.gradle/gradle.properties, which is a
# per-machine file and never reaches CI.)
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# The Kotlin compile daemon gets its own JVM; the CI OOM occurred here.
kotlin.daemon.jvmargs=-Xmx3g

# Reuse build outputs across runs (CI persists ~/.gradle via setup-java's cache).
org.gradle.caching=true
